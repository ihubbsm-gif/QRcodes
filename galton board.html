<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galton Board</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}
body{
background:#f4f6f9;
padding:20px;
}
.container{
max-width:1400px;
margin:auto;
}
.header{
background:linear-gradient(90deg,#002f6c,#003d91);
color:white;
border-radius:25px;
padding:25px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}
.header h1{
text-align:center;
font-size:4rem;
letter-spacing:3px;
font-weight:900;
}
.header h2{
text-align:center;
font-size:1.5rem;
letter-spacing:3px;
font-weight:600;
}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}
.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.card-header{
padding:15px 20px;
font-size:1.5rem;
font-weight:700;
display:flex;
align-items:center;
gap:12px;
}
.card-body{
padding:25px;
font-size:1.1rem;
line-height:1.7;
}
.yellow{border:3px solid #f3c54b;}
.yellow .card-header{background:#fff6db;}
.green{border:3px solid #9ad17a;}
.green .card-header{background:#eef9e7;}
.blue{border:3px solid #5aa9ff;}
.blue .card-header{background:#ebf4ff;}
.purple{border:3px solid #bc8cff;}
.purple .card-header{background:#f4ecff;}
.orange{border:3px solid #ffb65e;}
.orange .card-header{background:#fff2de;}
.pink{border:3px solid #ff7caf;}
.pink .card-header{background:#ffeaf3;}
.teal{border:3px solid #2ecc71;}
.teal .card-header{background:#e8f8f0;}
.red{border:3px solid #ff6b6b;}
.red .card-header{background:#ffe8e8;}
.cyan{border:3px solid #2ec7d6;}
.cyan .card-header{background:#eafcff;}
ul{padding-left:25px;}
li{margin-bottom:12px;}
.concept-box{
background:#f8f9fa;
border-radius:12px;
padding:15px;
margin-bottom:15px;
border-left:4px solid #5aa9ff;
}
.concept-box h4{
font-size:1.05rem;
font-weight:700;
color:#003d91;
margin-bottom:8px;
}
.concept-box ul{
padding-left:18px;
margin:0;
}
.concept-box li{
font-size:0.95rem;
margin-bottom:6px;
}
video{width:100%;border-radius:15px;}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}
.gallery img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:.3s;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}
.gallery img:hover{transform:scale(1.05);}
.full-width{grid-column:1/-1;}
.card-header i{font-size:1.5rem;}
@media(max-width:900px){
.grid{grid-template-columns:1fr;}
.header h1{font-size:2rem;}
.card-body{font-size
